<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aloecrypt Example</title>
    <script type="module">
        import { initPlugin, DilithiumSigner }
            from "https://cdn.jsdelivr.net/npm/@aloecraft/aloecrypt/dist/bundle.js";

        const wasm = await fetch("https://cdn.jsdelivr.net/npm/@aloecraft/aloecrypt/dist/aloecrypt_plugin.wasm")
            .then(r => r.arrayBuffer());

        await initPlugin(wasm);

        const root = await DilithiumSigner.new();
        console.log(root.address);
    </script>
</head>
<body>
</body>
</html>
